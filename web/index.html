<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏NPC语音生成器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>游戏NPC语音生成器</h1>
      <div class="subtitle">粘贴策划剧本 → 自动建角色 → 批量合成 → 打包导出</div>
    </div>
    <div class="muted" id="statSummary"></div>
  </header>

  <nav>
    <button data-tab="dialogues" class="active">对话合成</button>
    <button data-tab="characters">角色管理</button>
    <button data-tab="models">模型管理</button>
    <button data-tab="settings">软件设置</button>
  </nav>

  <section id="dialogues" class="active"></section>
  <section id="characters"></section>
  <section id="models"></section>
  <section id="settings"></section>
</div>

<div class="modal-backdrop" id="modal"><div class="modal" id="modalContent"></div></div>

<script src="app.js"></script>
<script src="dialogues-render.js"></script>
<script src="dialogues-form.js"></script>
<script src="dialogues-synth.js"></script>
<script src="characters.js"></script>
<script src="models.js"></script>
<script src="settings.js"></script>
</body>
</html>
